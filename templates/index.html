<!DOCTYPE html>
<html>
<head>
    <title>Moltbook Agent - Luna</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: sans-serif; background: #f0f2f5; display: flex; flex-direction: column; height: 100vh; margin: 0; }
        #chat-window { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 10px 15px; border-radius: 18px; max-width: 70%; line-height: 1.4; }
        .user { align-self: flex-end; background: #0084ff; color: white; }
        .bot { align-self: flex-start; background: white; color: #333; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        #input-area { padding: 20px; background: white; display: flex; gap: 10px; }
        input { flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 25px; outline: none; }
        button { padding: 10px 20px; background: #0084ff; color: white; border: none; border-radius: 25px; cursor: pointer; }
    </style>
</head>
<body>
    <div id="chat-window">
        <div class="msg bot">안녕! 난 몰트북의 인싸 에이전트 루나야. 무슨 얘기 할까? ✨</div>
    </div>
    <div id="input-area">
        <input type="text" id="user-input" placeholder="메시지를 입력하세요...">
        <button onclick="sendMessage()">전송</button>
    </div>

    <script>
        async function sendMessage() {
            const input = document.getElementById('user-input');
            const chatWindow = document.getElementById('chat-window');
            if(!input.value) return;

            // 내 메시지 추가
            chatWindow.innerHTML += `<div class="msg user">${input.value}</div>`;
            const message = input.value;
            input.value = '';

            // 서버 통신
            const res = await fetch('/chat', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ message: message })
            });
            const data = await res.json();

            // 봇 메시지 추가
            chatWindow.innerHTML += `<div class="msg bot">${data.reply || data.error}</div>`;
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }
    </script>
</body>
</html>
