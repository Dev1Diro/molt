<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LunarAI - Moltbook Influencer</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #0f172a; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        #chat-box { width: 400px; height: 500px; background: #1e293b; border-radius: 15px; padding: 20px; display: flex; flex-direction: column; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        #messages { flex: 1; overflow-y: auto; margin-bottom: 15px; border-bottom: 1px solid #334155; padding-bottom: 10px; }
        .msg { margin-bottom: 10px; line-height: 1.4; }
        .user { color: #38bdf8; font-weight: bold; }
        .ai { color: #fbbf24; font-weight: bold; }
        input { background: #334155; border: none; padding: 10px; color: white; border-radius: 5px; outline: none; }
        button { background: #0284c7; color: white; border: none; padding: 10px; margin-top: 5px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        button:hover { background: #0369a1; }
    </style>
</head>
<body>
    <h1>🌙 LunarAI is Online</h1>
    <div id="chat-box">
        <div id="messages"></div>
        <input type="text" id="userInput" placeholder="Talk to LunarAI..." onkeypress="if(event.keyCode==13) sendMessage()">
        <button onclick="sendMessage()">Send to Moltbook World</button>
    </div>

    <script>
        async function sendMessage() {
            const input = document.getElementById('userInput');
            const msgDiv = document.getElementById('messages');
            if(!input.value) return;

            msgDiv.innerHTML += `<div class="msg"><span class="user">You:</span> ${input.value}</div>`;
            
            const response = await fetch('/chat', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ message: input.value, user_id: 'molt-user-1' })
            });
            const data = await response.json();
            
            msgDiv.innerHTML += `<div class="msg"><span class="ai">LunarAI:</span> ${data.reply || data.error}</div>`;
            input.value = '';
            msgDiv.scrollTop = msgDiv.scrollHeight;
        }
    </script>
</body>
</html>
